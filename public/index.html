<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book to Audio Converter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 600px;
      width: 100%;
      padding: 40px;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 24px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }
    
    input[type="file"],
    select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    
    input[type="file"]:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
    }
    
    input[type="file"]::file-selector-button {
      background: #667eea;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      margin-right: 10px;
    }
    
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
    }
    
    .status.loading {
      background: #e3f2fd;
      color: #1976d2;
      display: block;
    }
    
    .status.success {
      background: #e8f5e9;
      color: #388e3c;
      display: block;
    }
    
    .status.error {
      background: #ffebee;
      color: #c62828;
      display: block;
    }
    
    .download-link {
      display: none;
      margin-top: 12px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 6px;
      text-align: center;
    }
    
    .download-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }
    
    .download-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📖 Book to Audio</h1>
    <p class="subtitle">Convert your manuscript to high-quality audio</p>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px;">
      <!-- File Upload Section -->
      <div>
        <h2 style="font-size: 16px; margin-bottom: 15px;">Upload File</h2>
        <form id="converterForm">
      <div class="form-group">
        <label for="file">Select Text File</label>
        <input type="file" id="file" name="file" accept=".txt" required>
      </div>
      
      <div class="form-group">
        <label for="voice">Voice</label>
        <select id="voice" name="voice">
          <option value="Aria">Aria (Female)</option>
          <option value="Bill">Bill (Male)</option>
          <option value="Callum">Callum (Male)</option>
          <option value="Lily">Lily (Female)</option>
        </select>
      </div>
      
      <button type="submit">Convert to Audio</button>
        </form>
        
        <div id="status" class="status"></div>
        <div id="downloadLink" class="download-link"></div>
      </div>
      
      <!-- Textarea Section -->
      <div>
        <h2 style="font-size: 16px; margin-bottom: 15px;">Paste & Play</h2>
        <form id="textForm">
          <div class="form-group">
            <label for="textInput">Your Text</label>
            <textarea id="textInput" name="text" placeholder="Paste your text here..." style="width: 100%; height: 200px; padding: 12px; border: 2px solid #e0e0e0; border-radius: 6px; font-family: monospace; font-size: 13px; resize: vertical;"></textarea>
          </div>
          
          <div class="form-group">
            <label for="voiceSelect">Voice</label>
            <select id="voiceSelect" name="voice">
              <option value="Aria">Aria (Female)</option>
              <option value="Bill">Bill (Male)</option>
              <option value="Callum">Callum (Male)</option>
              <option value="Lily">Lily (Female)</option>
            </select>
          </div>
          
          <button type="submit">Generate Audio</button>
        </form>
        
        <div id="textStatus" class="status" style="margin-top: 15px;"></div>
        <div id="audioPlayer" style="margin-top: 15px; display: none;">
          <audio controls style="width: 100%; margin-bottom: 10px;">
            <source id="audioSource" type="audio/mpeg">
            Your browser does not support the audio element.
          </audio>
          <p style="font-size: 12px; color: #666; text-align: center;" id="audioInfo"></p>
        </div>
      </div>
    </div>
    
    <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; font-size: 12px; color: #999; text-align: center;">
      <p>Book to Audio • Created: 2026-03-31 | Updated: 2026-03-31</p>
      <p><a href="/projects" style="color: #667eea; text-decoration: none;">← Back to Projects</a></p>
    </div>
  </div>
  
  <script>
    const form = document.getElementById('converterForm');
    const textForm = document.getElementById('textForm');
    const statusDiv = document.getElementById('status');
    const textStatusDiv = document.getElementById('textStatus');
    const downloadDiv = document.getElementById('downloadLink');
    const audioPlayer = document.getElementById('audioPlayer');
    const audioSource = document.getElementById('audioSource');
    const audioInfo = document.getElementById('audioInfo');
    const submitBtn = form.querySelector('button');
    const textSubmitBtn = textForm.querySelector('button');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const file = document.getElementById('file').files[0];
      const voice = document.getElementById('voice').value;
      const MAX_FILE_SIZE = 50 * 1024; // 50KB
      
      if (!file) {
        showStatus('Please select a file', 'error');
        return;
      }
      
      if (file.size > MAX_FILE_SIZE) {
        showStatus(`File too large (${(file.size/1024).toFixed(1)}KB). Max: 50KB`, 'error');
        return;
      }
      
      const formData = new FormData();
      formData.append('file', file);
      formData.append('voice', voice);
      
      showStatus(`Converting ${file.name} to audio...`, 'loading');
      submitBtn.disabled = true;
      
      try {
        const response = await fetch(window.location.pathname + '/api/convert', {
          method: 'POST',
          body: formData
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'Conversion failed');
        }
        
        showStatus(`✓ Conversion complete (${(data.size / 1024 / 1024).toFixed(1)} MB)`, 'success');
        showDownloadLink(data.file, data.filename);
        form.reset();
      } catch (error) {
        showStatus(`✗ Error: ${error.message}`, 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });
    
    function showStatus(message, type) {
      statusDiv.textContent = message;
      statusDiv.className = `status ${type}`;
    }
    
    function showDownloadLink(file, filename) {
      const basename = file.split('/').pop();
      downloadDiv.innerHTML = `
        <a href="${window.location.pathname}/api/download/${basename}" download="${filename}">
          ⬇️ Download MP3 (${filename})
        </a>
      `;
      downloadDiv.style.display = 'block';
    }
    
    // Text textarea handler
    textForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const text = document.getElementById('textInput').value;
      const voice = document.getElementById('voiceSelect').value;
      const MAX_CHARS = 5000;
      
      if (!text || text.trim().length === 0) {
        showTextStatus('Please enter some text', 'error');
        return;
      }
      
      if (text.length > MAX_CHARS) {
        showTextStatus(`Text too long (${text.length} chars). Max: ${MAX_CHARS}`, 'error');
        return;
      }
      
      showTextStatus(`Generating audio for ${text.length} characters...`, 'loading');
      textSubmitBtn.disabled = true;
      
      try {
        const response = await fetch(`${window.location.pathname}/api/text-to-audio`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ text, voice })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'Generation failed');
        }
        
        audioSource.src = `data:audio/mpeg;base64,${data.audio}`;
        audioPlayer.style.display = 'block';
        audioInfo.textContent = `✓ Generated (${(data.size / 1024).toFixed(1)}KB)`;
        showTextStatus(`✓ Audio ready`, 'success');
      } catch (error) {
        showTextStatus(`✗ Error: ${error.message}`, 'error');
      } finally {
        textSubmitBtn.disabled = false;
      }
    });
    
    function showTextStatus(message, type) {
      textStatusDiv.textContent = message;
      textStatusDiv.className = `status ${type}`;
    }
  </script>
</body>
</html>
