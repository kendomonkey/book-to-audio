<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book to Audio Converter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 600px;
      width: 100%;
      padding: 40px;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 24px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }
    
    input[type="file"],
    select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    
    input[type="file"]:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
    }
    
    input[type="file"]::file-selector-button {
      background: #667eea;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      margin-right: 10px;
    }
    
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
    }
    
    .status.loading {
      background: #e3f2fd;
      color: #1976d2;
      display: block;
    }
    
    .status.success {
      background: #e8f5e9;
      color: #388e3c;
      display: block;
    }
    
    .status.error {
      background: #ffebee;
      color: #c62828;
      display: block;
    }
    
    .download-link {
      display: none;
      margin-top: 12px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 6px;
      text-align: center;
    }
    
    .download-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }
    
    .download-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📖 Book to Audio</h1>
    <p class="subtitle">Convert your manuscript to high-quality audio</p>
    
    <form id="converterForm">
      <div class="form-group">
        <label for="file">Select Text File</label>
        <input type="file" id="file" name="file" accept=".txt" required>
      </div>
      
      <div class="form-group">
        <label for="voice">Voice</label>
        <select id="voice" name="voice">
          <option value="Aria">Aria (Female)</option>
          <option value="Bill">Bill (Male)</option>
          <option value="Callum">Callum (Male)</option>
          <option value="Lily">Lily (Female)</option>
        </select>
      </div>
      
      <button type="submit">Convert to Audio</button>
    </form>
    
    <div id="status" class="status"></div>
    <div id="downloadLink" class="download-link"></div>
    
    <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; font-size: 12px; color: #999; text-align: center;">
      <p>Book to Audio • Created: 2026-03-31 | Updated: 2026-03-31</p>
      <p><a href="/projects" style="color: #667eea; text-decoration: none;">← Back to Projects</a></p>
    </div>
  </div>
  
  <script>
    const form = document.getElementById('converterForm');
    const statusDiv = document.getElementById('status');
    const downloadDiv = document.getElementById('downloadLink');
    const submitBtn = form.querySelector('button');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const file = document.getElementById('file').files[0];
      const voice = document.getElementById('voice').value;
      
      if (!file) {
        showStatus('Please select a file', 'error');
        return;
      }
      
      const formData = new FormData();
      formData.append('file', file);
      formData.append('voice', voice);
      
      showStatus(`Converting ${file.name} to audio...`, 'loading');
      submitBtn.disabled = true;
      
      try {
        const response = await fetch('/api/convert', {
          method: 'POST',
          body: formData
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'Conversion failed');
        }
        
        showStatus(`✓ Conversion complete (${(data.size / 1024 / 1024).toFixed(1)} MB)`, 'success');
        showDownloadLink(data.file, data.filename);
        form.reset();
      } catch (error) {
        showStatus(`✗ Error: ${error.message}`, 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });
    
    function showStatus(message, type) {
      statusDiv.textContent = message;
      statusDiv.className = `status ${type}`;
    }
    
    function showDownloadLink(file, filename) {
      downloadDiv.innerHTML = `
        <a href="/api/download/${path.basename(file)}" download="${filename}">
          ⬇️ Download MP3 (${filename})
        </a>
      `;
      downloadDiv.style.display = 'block';
    }
  </script>
</body>
</html>
